<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #06101c;
  font-family: 'Segoe UI', Inter, sans-serif;
  overflow-x: auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
}
h1 {
  color: #00e676;
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: .07em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
}
p.sub { color: #4a7a8a; font-size: .75rem; text-align: center; margin-bottom: 20px; }

svg { display: block; }

/* Branch node circles */
.branch-circle { cursor: pointer; }
.branch-circle circle { transition: r .15s; }
.branch-circle:hover circle { r: 36; }

/* Leaf boxes */
.leaf rect { rx: 6; }

/* Leaves that link to an official norm */
a.leaf-link { cursor: pointer; }
a.leaf-link rect { transition: fill-opacity .15s, stroke-width .15s; }
a.leaf-link:hover rect { fill-opacity: .3 !important; stroke-width: 2 !important; }
a.leaf-link:focus rect { fill-opacity: .3 !important; stroke-width: 2 !important; }

/* Root pulse */
@keyframes pulse {
  0%,100% { opacity: .5; transform: scale(1); }
  50%      { opacity: .15; transform: scale(1.18); }
}
.root-pulse { transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }

/* ── Barra de status (somente leitura) ── */
#updateBar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #0b1c2c;
  border-top: 1px solid #1a3a4a;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  color: #4a7a8a;
  z-index: 30;
}
</style>

// --- Layout constants ---
const CX = 520;           // centre X of root
const ROOT_R = 52;
const BRANCH_R = 34;

const LEAF_W = 270;       // leaf box width
const LEAF_H = 28;        // leaf box height
const LEAF_GAP = 7;       // vertical gap between leaves
const BRANCH_GAP = 28;    // vertical gap between branches

// horizontal distances
const ROOT_TO_BRANCH = 130;   // root edge → branch centre
const BRANCH_TO_LEAF = 90;    // branch edge → leaf start

// ---- compute total height ----
const leftBranches  = BRANCHES.filter(b => b.side === 'left');
const rightBranches = BRANCHES.filter(b => b.side === 'right');

function branchHeight(b, expanded) {
  if (!expanded) return BRANCH_R * 2;
  return Math.max(BRANCH_R * 2, b.leaves.length * (LEAF_H + LEAF_GAP) - LEAF_GAP);
}

const state = {};  // id → expanded bool
BRANCHES.forEach(b => state[b.id] = false);

function totalColumnHeight(branches) {
  return branches.reduce((s, b) => s + branchHeight(b, state[b.id]) + BRANCH_GAP, -BRANCH_GAP);
}

function draw() {
  const leftH  = totalColumnHeight(leftBranches);
  const rightH = totalColumnHeight(rightBranches);
  const contentH = Math.max(leftH, rightH);
  const SVG_H = contentH + ROOT_R * 2 + 60;

  // x positions
  const branchLX = CX - ROOT_TO_BRANCH - BRANCH_R;       // left branch cx
  const branchRX = CX + ROOT_TO_BRANCH + BRANCH_R;       // right branch cx
  const leafLX   = branchLX - BRANCH_TO_LEAF - LEAF_W;   // left leaf right edge (leaves go leftward)
  const leafRX   = branchRX + BRANCH_TO_LEAF;             // right leaf left edge

  const CY = SVG_H / 2;

  // Margem extra de segurança: textos mais longos (ex.: com o ícone 🔗)
  // podem ultrapassar ligeiramente a largura da caixa. Em vez de fixar o
  // viewBox em "0 0 ...", calculamos a extensão real do conteúdo para a
  // esquerda e para a direita, evitando que qualquer folha fique cortada.
  const OVERFLOW_MARGIN = 60;
  const minX = Math.min(0, leafLX - OVERFLOW_MARGIN);
  const maxX = leafRX + LEAF_W + OVERFLOW_MARGIN;
  const SVG_W = maxX - minX;

  // Build SVG string
  let s = `<svg viewBox="${minX} 0 ${SVG_W} ${SVG_H}" width="${SVG_W}" style="max-width:100%">`;
  s += `<defs>
    <radialGradient id="rg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#007a33"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg"><feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  // --- draw each column ---
  function drawColumn(branches, side) {
    const bx = side === 'left' ? branchLX : branchRX;
    const colH = totalColumnHeight(branches);
    let y = CY - colH / 2 + BRANCH_R;

    branches.forEach(b => {
      const by = y;
      const exp = state[b.id];
      const bh = branchHeight(b, exp);
      const midY = by + (bh - BRANCH_R * 2) / 2;   // vertical centre of this branch block

      // root → branch line (horizontal)
      const lx1 = side === 'left' ? CX - ROOT_R : CX + ROOT_R;
      const lx2 = side === 'left' ? bx + BRANCH_R : bx - BRANCH_R;
      s += `<line x1="${lx1}" y1="${CY}" x2="${lx2}" y2="${midY}"
        stroke="${b.color}" stroke-width="2" stroke-opacity=".5"
        stroke-dasharray="${exp ? 'none' : '5 3'}"/>`;

      // branch → leaves lines + leaf boxes
      if (exp) {
        const lStartX = side === 'left' ? bx - BRANCH_R - BRANCH_TO_LEAF : bx + BRANCH_R + BRANCH_TO_LEAF;
        b.leaves.forEach((leaf, i) => {
          const ly = by + i * (LEAF_H + LEAF_GAP);
          const lcy = ly + LEAF_H / 2;
          const llx = side === 'left' ? leafLX : leafRX;
          const url = leafUrl(leaf);
          const txt = leafText(leaf);

          // connector line branch → leaf
          const connX1 = side === 'left' ? bx - BRANCH_R : bx + BRANCH_R;
          const connX2 = side === 'left' ? llx + LEAF_W : llx;
          s += `<path d="M ${connX1} ${midY} C ${(connX1+connX2)/2} ${midY}, ${(connX1+connX2)/2} ${lcy}, ${connX2} ${lcy}"
            fill="none" stroke="${b.color}" stroke-width="1.4" stroke-opacity=".6" stroke-dasharray="4 3"/>`;

          if (url) {
            s += `<a href="${url}" target="_blank" rel="noopener noreferrer" class="leaf-link"
              onclick="try{window.open('${url}','_blank','noopener,noreferrer');}catch(e){} return false;">
              <title>${escHtml(txt)} — abrir norma oficial (nova aba)</title>`;
          }

          // leaf box
          s += `<rect x="${llx}" y="${ly}" width="${LEAF_W}" height="${LEAF_H}" rx="6"
            fill="${b.color}" fill-opacity="${url ? .2 : .12}" stroke="${b.color}" stroke-width="${url ? 1.6 : 1.1}" stroke-opacity="${url ? 1 : .7}"/>`;
          // leaf text
          const tx = llx + LEAF_W/2;
          s += `<text x="${tx}" y="${lcy}" text-anchor="middle" dominant-baseline="middle"
            fill="${url ? '#c8f1ff' : '#dff3ff'}" font-size="10.5" font-family="Segoe UI,Inter,sans-serif">${escHtml(txt)}${url ? '  🔗' : ''}</text>`;

          if (url) s += `</a>`;
        });
      }

      // branch circle (drawn on top)
      const filter = exp ? 'filter="url(#sg)"' : '';
      s += `<g class="branch-g" data-id="${b.id}" ${filter} style="cursor:pointer">
        <circle cx="${bx}" cy="${midY}" r="${BRANCH_R}"
          fill="${b.color}" fill-opacity="${exp ? .3 : .15}"
          stroke="${b.color}" stroke-width="${exp ? 2.5 : 1.5}"/>
        <text x="${bx}" y="${midY - 13}" text-anchor="middle" dominant-baseline="middle" font-size="17">${b.icon}</text>
        <text x="${bx}" y="${midY + 5}" text-anchor="middle" dominant-baseline="middle"
          fill="#fff" font-size="10.5" font-weight="700" font-family="Segoe UI,Inter,sans-serif">${b.label}</text>
        <text x="${bx}" y="${midY + 20}" text-anchor="middle" dominant-baseline="middle"
          fill="${b.color}" font-size="8.5" font-family="Segoe UI,Inter,sans-serif" opacity=".85">
          ${exp ? '▲ fechar' : `▼ ${b.leaves.length} itens`}</text>
      </g>`;

      y += bh + BRANCH_GAP;
    });
  }

  drawColumn(leftBranches,  'left');
  drawColumn(rightBranches, 'right');

  // root node (on top of everything)
  s += `<circle cx="${CX}" cy="${CY}" r="${ROOT_R + 10}" fill="#00C853" fill-opacity=".08" class="root-pulse"/>`;
  s += `<circle cx="${CX}" cy="${CY}" r="${ROOT_R}" fill="url(#rg)" filter="url(#glow)"/>`;
  s += `<text x="${CX}" y="${CY - 9}" text-anchor="middle" dominant-baseline="middle"
    fill="#fff" font-size="18" font-weight="900" font-family="Segoe UI,Inter,sans-serif">Pix</text>`;
  s += `<text x="${CX}" y="${CY + 11}" text-anchor="middle" dominant-baseline="middle"
    fill="#b9f6ca" font-size="10" font-weight="600" font-family="Segoe UI,Inter,sans-serif">Regulamentos</text>`;
  s += `<text x="${CX}" y="${CY + 26}" text-anchor="middle" dominant-baseline="middle"
    fill="#69f0ae" font-size="8.5" font-family="Segoe UI,Inter,sans-serif">BCB</text>`;

  s += `</svg>`;

  document.getElementById('wrap').innerHTML = s;

  // attach click handlers
  document.querySelectorAll('.branch-g').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      state[id] = !state[id];
      draw();
    });
  });
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// folhas podem ser uma string simples ou {t, url} quando citam uma norma
function leafText(l) { return typeof l === 'string' ? l : l.t; }
function leafUrl(l)  { return typeof l === 'string' ? null : (l.url || null); }

draw();

// Trunca texto para caber dentro da caixa (270px útil, ~41 chars com 🔗)
function fitLeafText(txt) {
  const MAX_CHARS = 41;
  if (txt.length <= MAX_CHARS) return txt;
  return txt.slice(0, MAX_CHARS - 1).trimEnd() + '…';
}

// __AUTO_NORMS_END__
];

// Data da última injeção automática (atualizada pelo script Python)
const LAST_AUTO_UPDATE = '24/06/2026'; // __LAST_UPDATE__

function applyAutoNorms() {
  AUTO_NORMS.forEach(n => {
    if (!n || !n.tipo || !n.numero || !n.leafText || !n.branch) return;
    const url  = bcbNorm(n.tipo, n.numero);
    const leaf = { t: fitLeafText(n.leafText), url };
    const branch = BRANCHES.find(b => b.id === n.branch);
    if (!branch) return;
    if (!branch.leaves.some(l => leafText(l) === leaf.t)) {
      branch.leaves.push(leaf);
      state[n.branch] = true; // expande o ramo para mostrar a novidade
    }
    if (n.branch !== 'legal') {
      const legal = BRANCHES.find(b => b.id === 'legal');
      if (legal && !legal.leaves.some(l => leafText(l) === leaf.t)) {
        legal.leaves.push(leaf);
        state['legal'] = true;
      }
    }
  });
}

// ── Inicialização ────────────────────────────────────────────
(function init() {
  applyAutoNorms();
  draw();

  const statusEl = document.getElementById('updateStatus');
  if (statusEl) {
    statusEl.textContent = LAST_AUTO_UPDATE
      ? `🔄 Última atualização automática: ${LAST_AUTO_UPDATE}`
      : '🔄 Atualizado automaticamente via GitHub Actions';
  }
})();
</script>
